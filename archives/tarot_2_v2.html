<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#151411">
  <title>Le Mat - Atlas Tarot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <style>
    :root { --ink:#151411; --paper:#ece5d9; --quiet:#aaa297; --line:rgba(236,229,217,.24); --accent:#c96b45; --card:#23211c; }
    * { box-sizing:border-box; }
    html { background:var(--ink); }
    body { margin:0; min-width:320px; background:var(--ink); color:var(--paper); font-family:Manrope,system-ui,sans-serif; }
    a:focus-visible { outline:2px solid var(--accent); outline-offset:4px; }
    .page { min-height:100dvh; display:grid; grid-template-columns:minmax(330px,.8fr) minmax(460px,1.2fr); overflow:hidden; }
    .copy { padding:clamp(26px,4vw,68px); display:flex; flex-direction:column; justify-content:space-between; position:relative; z-index:1; }
    .back { align-self:flex-start; color:var(--quiet); text-decoration:none; font:11px 'DM Mono',monospace; letter-spacing:.1em; text-transform:uppercase; transition:color .18s ease-out; }
    .back:hover { color:var(--paper); }
    .back span { color:var(--accent); margin-right:7px; }
    .title-block { margin-top:auto; padding-top:10vh; }
    .eyebrow { color:var(--accent); font:11px 'DM Mono',monospace; letter-spacing:.12em; text-transform:uppercase; }
    h1 { max-width:580px; margin:19px 0 0; font:500 clamp(66px,8vw,138px)/.81 'Playfair Display',Georgia,serif; letter-spacing:-.065em; }
    h1 em { display:block; color:var(--accent); font-weight:500; }
    .intro { max-width:405px; margin:30px 0 0; color:#bcb4a8; font:400 clamp(15px,1.35vw,18px)/1.65 'Playfair Display',Georgia,serif; }
    .index { display:flex; justify-content:space-between; align-items:end; padding-top:46px; color:var(--quiet); border-top:1px solid var(--line); font:10px 'DM Mono',monospace; letter-spacing:.1em; text-transform:uppercase; }
    .index strong { color:var(--paper); font-weight:500; }
    .visual { min-height:100dvh; padding:clamp(18px,3vw,52px); display:grid; place-items:center; background:var(--card); position:relative; }
    .visual:before { content:''; position:absolute; inset:18px; border:1px solid rgba(236,229,217,.13); pointer-events:none; }
    .visual:after { content:'0 / 22'; position:absolute; top:clamp(32px,5vw,76px); right:clamp(32px,5vw,76px); color:var(--accent); font:11px 'DM Mono',monospace; letter-spacing:.15em; }
    figure { width:min(100%,650px); height:min(84dvh,920px); margin:0; position:relative; z-index:1; }
    figure:before { content:''; position:absolute; inset:12px -12px -12px 12px; border:1px solid rgba(201,107,69,.5); pointer-events:none; }
    img { display:block; width:100%; height:100%; object-fit:cover; object-position:center; position:relative; z-index:1; }
    figcaption { position:absolute; right:-14px; bottom:20px; z-index:2; padding:8px 10px; background:var(--paper); color:var(--ink); font:10px 'DM Mono',monospace; letter-spacing:.09em; text-transform:uppercase; writing-mode:vertical-rl; }
    @media (max-width:820px) {
      .page { display:block; overflow:visible; }
      .copy { min-height:56dvh; padding:26px 24px 32px; }
      .title-block { margin-top:0; padding-top:clamp(70px,14dvh,130px); }
      h1 { font-size:clamp(67px,21vw,112px); }
      .intro { max-width:34rem; margin-top:24px; }
      .index { margin-top:45px; padding-top:18px; }
      .visual { min-height:0; height:82dvh; padding:24px; }
      .visual:before { inset:10px; }
      .visual:after { top:26px; right:26px; }
      figure { height:min(72dvh,720px); width:min(100%,470px); }
    }
    @media (max-width:420px) {
      .copy { min-height:58dvh; }
      .visual { height:76dvh; padding:18px; }
      figure { height:68dvh; }
      figcaption { right:-9px; bottom:12px; }
    }
    @media (prefers-reduced-motion:reduce) { * { scroll-behavior:auto; transition-duration:.01ms!important; } }
  </style>
</head>
<body>
  <main class="page">
    <section class="copy" aria-labelledby="card-title">
      <a class="back" href="website/index.html"><span aria-hidden="true">&larr;</span>Retour à l'atlas</a>
      <div class="title-block">
        <div class="eyebrow">Arcane majeur 00</div>
        <h1 id="card-title">Le <em>Mat</em></h1>
        <p class="intro">Il ne possède ni carte ni itinéraire. Il avance pourtant, porté par l'intuition d'un commencement qui ne demande aucune certitude.</p>
      </div>
      <div class="index"><span>Tarot divinatoire</span><strong>Le fou / The fool</strong></div>
    </section>
    <section class="visual" aria-label="Illustration du Mat">
      <figure>
        <img src="website/cards/a_00_Fou.jpg" alt="Le Mat, arcane majeur du tarot">
        <figcaption>Innocence · Élan · Liberté</figcaption>
      </figure>
    </section>
  </main>
</body>
</html>
